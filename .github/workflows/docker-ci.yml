name: Docker CI Pipeline

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t housing-ml-api .

      - name: Run container
        run: docker run -d -p 8000:8000 housing-ml-api

      - name: Wait for API
        run: sleep 15

      - name: Test API
        run: curl http://localhost:8000/docs
